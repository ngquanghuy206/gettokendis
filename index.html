<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord • Web Embed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #202225;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: white;
        }
        .header {
            background: #36393f;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #2f3136;
            z-index: 100;
        }
        .title {
            font-size: 18px;
            font-weight: 600;
        }
        .iframe-container {
            width: 100%;
            height: calc(100vh - 56px);
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10;
            color: #dcddde;
        }
        button {
            margin-top: 20px;
            padding: 10px 24px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #4752c4;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">
            <i class="fab fa-discord"></i> Discord Web
        </div>
        <div>
            <button onclick="reloadDiscord()">🔄 Tải lại</button>
        </div>
    </div>

    <div class="iframe-container">
        <iframe id="discordFrame" 
                src="https://discord.com/channels/@me" 
                allow="clipboard-write; encrypted-media; picture-in-picture">
        </iframe>

        <!-- Thông báo khi Discord chặn iframe -->
        <div class="overlay" id="blockOverlay">
            <h2>Discord không cho nhúng vào iframe</h2>
            <p>Discord đã chặn việc mở trực tiếp trong khung này.</p>
            <button onclick="openInNewTab()">Mở Discord trong tab mới</button>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('discordFrame');
        const overlay = document.getElementById('blockOverlay');

        // Kiểm tra xem iframe có load được không
        iframe.onload = function() {
            try {
                // Nếu Discord chặn thì thường iframe sẽ trống hoặc có lỗi
                setTimeout(() => {
                    if (iframe.contentWindow.location.href === 'about:blank' || 
                        iframe.contentDocument.body.innerHTML === '') {
                        overlay.style.display = 'flex';
                    }
                }, 3000);
            } catch(e) {
                // Cross-origin error → bị chặn
                overlay.style.display = 'flex';
            }
        };

        function reloadDiscord() {
            iframe.src = iframe.src;
        }

        function openInNewTab() {
            window.open('https://discord.com/channels/@me', '_blank');
        }

        // Thử reload nếu bị chặn
        setTimeout(() => {
            if (overlay.style.display !== 'flex') {
                console.log("✅ Discord đang load...");
            }
        }, 5000);
    </script>
</body>
</html>
